{% extends 'base.tpl.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-lg">
            <div class="card-header bg-dark text-white text-center py-3">
                <h3 class="mb-0">Înregistrare</h3>
            </div>
            <div class="card-body p-4">
                
                {% if eroare %}
                    <div class="alert alert-danger" role="alert">
                        {{ eroare }}
                    </div>
                {% endif %}

                <form action="register.php" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label text-muted">Nume de utilizator</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label text-muted">Adresa de Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label text-muted">Parolă</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-4">
                        <label for="password_confirm" class="form-label text-muted">Confirmă Parola</label>
                        <input type="password" class="form-control" id="password_confirm" name="password_confirm" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2">Creează Cont</button>
                </form>
                
                <div class="text-center mt-3">
                    <p class="text-muted">Ai deja cont? <a href="login.php" class="text-primary text-decoration-none">Înapoi la Login</a></p>
                </div>
                
            </div>
        </div>
    </div>
</div>
{% endblock %}
